spring:
  application:
    name: fusion-rag
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

fusion-rag:
  upload-directory: uploads
  document-directory: src/main/resources/documents
  chunk:
    size: 500
    overlap: 100
  retrieval:
    top-k: 5
  vector:
    dimension: 1024

voyage:
  api-key: ${EP_ACC_VOYAGE_KEY}
  model: voyage-3.5-lite
  url: https://api.voyageai.com/v1/embeddings

claude:
  api-key: YOUR_CLAUDE_API_KEY

logging:
  level:
    root: INFO
    com.prince.ai: DEBUG
